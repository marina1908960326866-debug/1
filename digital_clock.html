<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #282c34;\n            color: white;\n            font-family: Arial, sans-serif;\n            font-size: 2rem;\n        }\n        .clock {\n            text-align: center;\n        }\n        .timezone {\n            margin: 10px 0;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <div id="utc" class="timezone"></div>\n        <div id="est" class="timezone"></div>\n        <div id="pst" class="timezone"></div>\n        <div id="gmt" class="timezone"></div>\n        <div id="ist" class="timezone"></div>\n        <div id="jst" class="timezone"></div>\n        <div id="aest" class="timezone"></div>\n    </div>\n    <script>\n        function updateClocks() {\n            const options = { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', second: '2-digit' };\n            document.getElementById('utc').textContent = 'UTC: ' + new Intl.DateTimeFormat('en-US', options).format(new Date());\n            options.timeZone = 'America/New_York';\n            document.getElementById('est').textContent = 'EST: ' + new Intl.DateTimeFormat('en-US', options).format(new Date());\n            options.timeZone = 'America/Los_Angeles';\n            document.getElementById('pst').textContent = 'PST: ' + new Intl.DateTimeFormat('en-US', options).format(new Date());\n            options.timeZone = 'Europe/London';\n            document.getElementById('gmt').textContent = 'GMT: ' + new Intl.DateTimeFormat('en-US', options).format(new Date());\n            options.timeZone = 'Asia/Kolkata';\n            document.getElementById('ist').textContent = 'IST: ' + new Intl.DateTimeFormat('en-US', options).format(new Date());\n            options.timeZone = 'Asia/Tokyo';\n            document.getElementById('jst').textContent = 'JST: ' + new Intl.DateTimeFormat('en-US', options).format(new Date());\n            options.timeZone = 'Australia/Sydney';\n            document.getElementById('aest').textContent = 'AEST: ' + new Intl.DateTimeFormat('en-US', options).format(new Date());\n        }\n        setInterval(updateClocks, 1000);\n        updateClocks();\n    </script>\n</body>\n</html>
