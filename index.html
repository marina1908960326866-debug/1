<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парфум Реклама - 3D Модель</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        #container {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            max-width: 300px;
        }
        
        .info h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .info p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 5px;
        }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="info">
            <h1>✨ ESSENCE ✨</h1>
            <p>Елегантний парфум для справжніх жінок</p>
            <p>🌸 Верхні ноти: троянда, пергамон</p>
            <p>💎 Серцеві ноти: жасмин, ваніль</p>
            <p>🌲 Базові ноти: кедр, мускус</p>
        </div>
        
        <div class="instructions">
            <p>🖱️ Крутіть мишкою щоб обертати модель</p>
            <p>🔄 Автоматична анімація</p>
        </div>
    </div>

    <script>
        // Сцена, камера, рендер
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a1a4e);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        document.getElementById('container').appendChild(renderer.domElement);
        
        // Освітлення
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.far = 50;
        scene.add(directionalLight);
        
        const pointLight = new THREE.PointLight(0xff69b4, 0.5, 100);
        pointLight.position.set(-5, 2, 5);
        scene.add(pointLight);
        
        // Група для дівчини
        const girlGroup = new THREE.Group();
        scene.add(girlGroup);
        
        // Функція для створення закругленого циліндра
        function createRoundedCylinder(radiusTop, radiusBottom, height, segments, material) {
            const geometry = new THREE.CylinderGeometry(radiusTop, radiusBottom, height, segments);
            return new THREE.Mesh(geometry, material);
        }
        
        // Матеріали
        const skinMaterial = new THREE.MeshStandardMaterial({
            color: 0xfdbcb4,
            roughness: 0.4,
            metalness: 0,
            side: THREE.DoubleSide
        });
        
        const hairMaterial = new THREE.MeshStandardMaterial({
            color: 0x3d2817,
            roughness: 0.3,
            metalness: 0.1
        });
        
        const dressMaterial = new THREE.MeshStandardMaterial({
            color: 0xd4a5d4,
            roughness: 0.2,
            metalness: 0.3,
            emissive: 0x6b4c7a,
            emissiveIntensity: 0.3
        });
        
        const eyeMaterial = new THREE.MeshStandardMaterial({
            color: 0x8b4513,
            roughness: 0.1,
            metalness: 0
        });
        
        const eyeWhiteMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.1
        });
        
        // Голова
        const headGeometry = new THREE.SphereGeometry(0.35, 32, 32);
        const head = new THREE.Mesh(headGeometry, skinMaterial);
        head.position.y = 1.2;
        head.castShadow = true;
        head.receiveShadow = true;
        girlGroup.add(head);
        
        // Вуха
        const earGeometry = new THREE.SphereGeometry(0.1, 16, 16);
        const leftEar = new THREE.Mesh(earGeometry, skinMaterial);
        leftEar.position.set(-0.35, 1.2, 0);
        leftEar.scale.set(0.8, 1, 0.6);
        leftEar.castShadow = true;
        girlGroup.add(leftEar);
        
        const rightEar = new THREE.Mesh(earGeometry, skinMaterial);
        rightEar.position.set(0.35, 1.2, 0);
        rightEar.scale.set(0.8, 1, 0.6);
        rightEar.castShadow = true;
        girlGroup.add(rightEar);
        
        // Волосся (довге, розвивається)
        const hairGroup = new THREE.Group();
        head.add(hairGroup);
        
        // Головна частина волосся
        const hairGeometry = new THREE.SphereGeometry(0.38, 32, 32);
        const hair = new THREE.Mesh(hairGeometry, hairMaterial);
        hair.position.y = 0;
        hair.scale.set(1, 1.3, 1);
        hair.castShadow = true;
        hairGroup.add(hair);
        
        // Довге волосся ззаду
        const longHairGeometry = new THREE.ConeGeometry(0.25, 1.5, 32);
        const longHair = new THREE.Mesh(longHairGeometry, hairMaterial);
        longHair.position.set(0, -0.8, -0.1);
        longHair.castShadow = true;
        hairGroup.add(longHair);
        
        // Волосся по боках
        const sideHair1 = new THREE.Mesh(
            new THREE.ConeGeometry(0.15, 0.8, 16),
            hairMaterial
        );
        sideHair1.position.set(-0.3, -0.3, -0.05);
        sideHair1.rotation.z = 0.3;
        sideHair1.castShadow = true;
        hairGroup.add(sideHair1);
        
        const sideHair2 = new THREE.Mesh(
            new THREE.ConeGeometry(0.15, 0.8, 16),
            hairMaterial
        );
        sideHair2.position.set(0.3, -0.3, -0.05);
        sideHair2.rotation.z = -0.3;
        sideHair2.castShadow = true;
        hairGroup.add(sideHair2);
        
        // Очі
        const eyeWhiteGeometry = new THREE.SphereGeometry(0.08, 16, 16);
        const leftEyeWhite = new THREE.Mesh(eyeWhiteGeometry, eyeWhiteMaterial);
        leftEyeWhite.position.set(-0.12, 0.15, 0.32);
        leftEyeWhite.castShadow = true;
        head.add(leftEyeWhite);
        
        const rightEyeWhite = new THREE.Mesh(eyeWhiteGeometry, eyeWhiteMaterial);
        rightEyeWhite.position.set(0.12, 0.15, 0.32);
        rightEyeWhite.castShadow = true;
        head.add(rightEyeWhite);
        
        // Радужка
        const irisGeometry = new THREE.SphereGeometry(0.045, 16, 16);
        const leftIris = new THREE.Mesh(irisGeometry, eyeMaterial);
        leftIris.position.set(-0.12, 0.15, 0.39);
        head.add(leftIris);
        
        const rightIris = new THREE.Mesh(irisGeometry, eyeMaterial);
        rightIris.position.set(0.12, 0.15, 0.39);
        head.add(rightIris);
        
        // Ніс
        const noseGeometry = new THREE.ConeGeometry(0.05, 0.15, 8);
        const nose = new THREE.Mesh(noseGeometry, skinMaterial);
        nose.position.set(0, 0.05, 0.33);
        nose.rotation.x = -Math.PI / 2;
        nose.castShadow = true;
        head.add(nose);
        
        // Губи
        const lipGeometry = new THREE.SphereGeometry(0.06, 16, 16);
        const lips = new THREE.Mesh(
            lipGeometry,
            new THREE.MeshStandardMaterial({ color: 0xff1493, roughness: 0.3 })
        );
        lips.position.set(0, -0.1, 0.33);
        lips.scale.set(1.2, 0.6, 0.8);
        lips.castShadow = true;
        head.add(lips);
        
        // Шия
        const neckGeometry = new THREE.CylinderGeometry(0.15, 0.2, 0.3, 16);
        const neck = new THREE.Mesh(neckGeometry, skinMaterial);
        neck.position.y = 0.75;
        neck.castShadow = true;
        neck.receiveShadow = true;
        girlGroup.add(neck);
        
        // Торс
        const torsoGeometry = new THREE.CapsuleGeometry(0.25, 0.6, 8, 16);
        const torso = new THREE.Mesh(torsoGeometry, skinMaterial);
        torso.position.y = 0.2;
        torso.castShadow = true;
        torso.receiveShadow = true;
        girlGroup.add(torso);
        
        // Руки
        const armGeometry = new THREE.CapsuleGeometry(0.08, 0.6, 8, 16);
        
        const leftArm = new THREE.Mesh(armGeometry, skinMaterial);
        leftArm.position.set(-0.35, 0.35, 0);
        leftArm.rotation.z = -0.3;
        leftArm.castShadow = true;
        leftArm.receiveShadow = true;
        girlGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeometry, skinMaterial);
        rightArm.position.set(0.35, 0.35, 0);
        rightArm.rotation.z = 0.3;
        rightArm.castShadow = true;
        rightArm.receiveShadow = true;
        girlGroup.add(rightArm);
        
        // Сукня
        const dressGeometry = new THREE.ConeGeometry(0.5, 1.2, 32);
        const dress = new THREE.Mesh(dressGeometry, dressMaterial);
        dress.position.y = -0.5;
        dress.castShadow = true;
        dress.receiveShadow = true;
        girlGroup.add(dress);
        
        // Частини сукні для об'єму
        const dressTop = new THREE.Mesh(
            new THREE.SphereGeometry(0.3, 16, 16),
            dressMaterial
        );
        dressTop.position.y = 0.1;
        dressTop.scale.set(1, 0.5, 1);
        dressTop.castShadow = true;
        girlGroup.add(dressTop);
        
        // ��оги
        const legGeometry = new THREE.CapsuleGeometry(0.08, 0.7, 8, 16);
        
        const leftLeg = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.07, 0.5, 8, 16),
            new THREE.MeshStandardMaterial({ color: 0xfdbcb4 })
        );
        leftLeg.position.set(-0.15, -1.3, 0);
        leftLeg.castShadow = true;
        leftLeg.receiveShadow = true;
        girlGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.07, 0.5, 8, 16),
            new THREE.MeshStandardMaterial({ color: 0xfdbcb4 })
        );
        rightLeg.position.set(0.15, -1.3, 0);
        rightLeg.castShadow = true;
        rightLeg.receiveShadow = true;
        girlGroup.add(rightLeg);
        
        // Туфлі
        const shoeGeometry = new THREE.BoxGeometry(0.15, 0.08, 0.25);
        const shoeMaterial = new THREE.MeshStandardMaterial({
            color: 0x2d1b4e,
            roughness: 0.5,
            metalness: 0.2
        });
        
        const leftShoe = new THREE.Mesh(shoeGeometry, shoeMaterial);
        leftShoe.position.set(-0.15, -1.65, 0);
        leftShoe.castShadow = true;
        leftShoe.receiveShadow = true;
        girlGroup.add(leftShoe);
        
        const rightShoe = new THREE.Mesh(shoeGeometry, shoeMaterial);
        rightShoe.position.set(0.15, -1.65, 0);
        rightShoe.castShadow = true;
        rightShoe.receiveShadow = true;
        girlGroup.add(rightShoe);
        
        // Партикли/світлові ефекти
        const particleGroup = new THREE.Group();
        scene.add(particleGroup);
        
        const particleGeometry = new THREE.SphereGeometry(0.02, 8, 8);
        const particleMaterial = new THREE.MeshBasicMaterial({ color: 0xff69b4 });
        
        const particles = [];
        for (let i = 0; i < 15; i++) {
            const particle = new THREE.Mesh(particleGeometry, particleMaterial);
            particle.position.set(
                (Math.random() - 0.5) * 4,
                (Math.random() - 0.5) * 4,
                (Math.random() - 0.5) * 2
            );
            particle.velocity = {
                x: (Math.random() - 0.5) * 0.02,
                y: (Math.random() - 0.5) * 0.02,
                z: (Math.random() - 0.5) * 0.02
            };
            particleGroup.add(particle);
            particles.push(particle);
        }
        
        // Мишка для обертання
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            
            targetRotationY = mouseX * Math.PI;
            targetRotationX = mouseY * Math.PI * 0.5;
        });
        
        // Обробка зміни розміру вікна
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
        
        // Анімація
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Обертання дівчини
            girlGroup.rotation.x += (targetRotationX - girlGroup.rotation.x) * 0.05;
            girlGroup.rotation.y += (targetRotationY - girlGroup.rotation.y) * 0.05;
            
            // Легке коливання волосся
            hairGroup.rotation.z = Math.sin(time * 1.5) * 0.1;
            
            // Коливання рук
            leftArm.rotation.z = -0.3 + Math.sin(time) * 0.2;
            rightArm.rotation.z = 0.3 - Math.sin(time) * 0.2;
            
            // Коливання сукні
            dress.rotation.z = Math.sin(time * 0.8) * 0.05;
            
            // Анімація очей
            leftIris.position.x = -0.12 + Math.sin(time * 2) * 0.02;
            rightIris.position.x = 0.12 + Math.sin(time * 2) * 0.02;
            
            // Анімація партиклів
            particles.forEach(particle => {
                particle.position.x += particle.velocity.x;
                particle.position.y += particle.velocity.y;
                particle.position.z += particle.velocity.z;
                
                // Відскок від границь
                if (Math.abs(particle.position.x) > 2) particle.velocity.x *= -1;
                if (Math.abs(particle.position.y) > 2) particle.velocity.y *= -1;
                if (Math.abs(particle.position.z) > 1) particle.velocity.z *= -1;
                
                particle.material.opacity = 0.3 + Math.sin(time + particles.indexOf(particle)) * 0.3;
            });
            
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
